<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ian Kuria - Professional portfolio website showcasing skills, projects, experience, and contact information." />
  <meta name="author" content="Ian Kuria" />
  <title>Ian Kuria | Portfolio</title>

  <style>
    :root {
      --bg: #0f172a;
      --bg-soft: #111c33;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.14);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --muted-2: #94a3b8;
      --primary: #38bdf8;
      --secondary: #a78bfa;
      --accent: #22c55e;
      --danger: #fb7185;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      --radius: 24px;
      --radius-sm: 16px;
      --max-width: 1180px;
      --transition: 220ms ease;
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --bg-soft: #eef2ff;
      --card: rgba(255, 255, 255, 0.78);
      --card-border: rgba(15, 23, 42, 0.1);
      --text: #0f172a;
      --muted: #334155;
      --muted-2: #64748b;
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.22), transparent 34rem),
        radial-gradient(circle at top right, rgba(167, 139, 250, 0.2), transparent 32rem),
        radial-gradient(circle at 50% 70%, rgba(34, 197, 94, 0.1), transparent 30rem),
        var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
      transition: background var(--transition), color var(--transition);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent 75%);
      z-index: -2;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .container {
      width: min(100% - 40px, var(--max-width));
      margin-inline: auto;
    }

    .site-header {
      position: fixed;
      top: 18px;
      left: 0;
      right: 0;
      z-index: 1000;
      pointer-events: none;
    }

    .nav {
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 12px 14px 12px 18px;
      border: 1px solid var(--card-border);
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.66);
      backdrop-filter: blur(18px);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.24);
      transition: background var(--transition), border-color var(--transition);
    }

    [data-theme="light"] .nav {
      background: rgba(255, 255, 255, 0.72);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: -0.03em;
      white-space: nowrap;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      box-shadow: 0 10px 30px rgba(56, 189, 248, 0.35);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 6px;
      list-style: none;
    }

    .nav-links a {
      display: inline-flex;
      padding: 9px 13px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.94rem;
      font-weight: 650;
      transition: color var(--transition), background var(--transition);
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
      background: rgba(255, 255, 255, 0.1);
    }

    [data-theme="light"] .nav-links a:hover,
    [data-theme="light"] .nav-links a.active {
      background: rgba(15, 23, 42, 0.06);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border: 1px solid var(--card-border);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform var(--transition), background var(--transition), border-color var(--transition);
    }

    .icon-btn:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(56, 189, 248, 0.45);
    }

    .menu-btn {
      display: none;
    }

      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 132px 0 80
