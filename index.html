<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ian Kuria — Professional Portfolio</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ── SYSTEM RESET & DESIGN TOKENS ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #faf9f6;      /* Editorial Warm White */
      --bg-card: #ffffff;         /* Pure Contrast White */
      --text-main: #141616;       /* Deep Charcoal */
      --text-muted: #5a6060;      /* Slate Gray */
      --brand-color: #104f55;     /* Premium Deep Teal Accent */
      --brand-light: #eef7f6;     /* soft teal tint */
      --border-line: #e4e8e8;     /* Clean Grid Line */
      --radius: 8px;
      --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    html { scroll-behavior: smooth; }
    body {
      background-color: var(--bg-primary);
      color: var(--text-main);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── STICKY EDITORIAL NAVIGATION ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 6vw;
      background: rgba(250, 249, 246, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-line);
    }
    .header-profile {
      display: flex; align-items: center; gap: 0.8rem;
      text-decoration: none; color: var(--text-main);
    }
    .profile-avatar-sm {
      width: 38px; height: 38px; border-radius: 50%;
      object-fit: cover; border: 1.5px solid var(--brand-color);
    }
    .profile-meta-title {
      font-size: 1.15rem; font-weight: 800; letter-spacing: -0.02em;
    }
    .profile-meta-title span { color: var(--brand-color); }
    
    header ul { list-style: none; display: flex; gap: 2.5rem; }
    header ul a {
      text-decoration: none; color: var(--text-muted);
      font-size: 0.9rem; font-weight: 600; transition: var(--transition);
    }
    header ul a:hover { color: var(--brand-color); }

    /* ── EDITORIAL HERO CONTAINER ── */
    #hero {
      min-height: 100vh; display: grid; grid-template-columns: 1.2fr 0.8fr;
      padding: 0 6vw; align-items: center; gap: 4rem; position: relative;
    }
    .hero-text-block { padding-top: 100px; max-width: 720px; }
    .hero-tagline {
      font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.2em;
      color: var(--brand-color); font-weight: 700; margin-bottom: 1.5rem;
    }
    .hero-heading {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 5.5vw, 4.8rem);
      font-weight: 700; line-height: 1.1; letter-spacing: -0.02em;
      margin-bottom: 2rem;
    }
    .hero-heading em { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 400; color: var(--brand-color); }
    .hero-paragraph {
      font-size: 1.15rem; color: var(--text-muted); font-weight: 400;
      margin-bottom: 3rem; max-width: 580px;
    }
    .hero-buttons { display: flex; gap: 1.2rem; flex-wrap: wrap; }
    .btn-solid {
      background-color: var(--brand-color); color: #ffffff;
      padding: 1rem 2.5rem; border-radius: var(--radius); text-decoration: none;
      font-weight: 600; font-size: 0.95rem; box-shadow: 0 4px 14px rgba(16, 79, 85, 0.2);
      transition: var(--transition); display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-solid:hover { background-color: #0c3b3f; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16, 79, 85, 0.3); }
    .btn-outline {
      border: 1px solid var(--border-line); background: var(--bg-card);
      color: var(--text-main); padding: 1rem 2.5rem; border-radius: var(--radius);
      text-decoration: none; font-weight: 600; font-size: 0.95rem; transition: var(--transition);
    }
    .btn-outline:hover { border-color: var(--brand-color); background: var(--brand-light); }

    /* Hero Visual Panel displaying GitHub Picture large */
    .hero-visual-panel { position: relative; width: 100%; display: flex; justify-content: center; }
    .hero-avatar-frame {
      width: 100%; max-width: 380px; aspect-ratio: 1/1; border-radius: 24px;
      overflow: hidden; border: 1px solid var(--border-line);
      box-shadow: 0 30px 60px rgba(20, 22, 22, 0.06); background-color: var(--bg-card);
    }
    .hero-avatar-img { width: 100%; height: 100%; object-fit: cover; }

    /* ── SECTIONS ARCHITECTURE ── */
    section { padding: 8rem 6vw; border-top: 1px solid var(--border-line); }
    .section-eyebrow { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.25em; color: var(--brand-color); font-weight: 700; margin-bottom: 0.8rem; }
    .section-headline { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 3.8vw, 3.2rem); font-weight: 700; letter-spacing: -0.01em; margin-bottom: 1rem; }
    .section-desc { color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin-bottom: 4.5rem; }

    /* ── SERVICES ASSETS ── */
    #services { background-color: var(--bg-card); }
    .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2.5rem; }
    .service-card {
      border: 1px solid var(--border-line); border-radius: 12px;
      padding: 3rem 2.5rem; background: var(--bg-primary); transition: var(--transition);
    }
    .service-card:hover { transform: translateY(-6px); border-color: var(--brand-color); box-shadow: 0 20px 40px rgba(0,0,0,0.03); }
    .service-num { font-family: 'Playfair Display', serif; font-style: italic; font-size: 2rem; color: var(--brand-color); opacity: 0.5; display: block; margin-bottom: 1.5rem; }
    .service-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 1rem; letter-spacing: -0.02em; }
    .service-text { color: var(--text-muted); font-size: 0.98rem; margin-bottom: 2rem; }
    .service-features { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
    .service-features li { display: flex; align-items: center; gap: 0.6rem; font-size: 0.88rem; font-weight: 600; color: var(--text-main); }
    .service-features li::before { content: "—"; color: var(--brand-color); font-weight: 800; }

    /* ── DYNAMIC PROJECTS MODULE ── */
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }
    .project-card {
      background: var(--bg-card); border: 1px solid var(--border-line); border-radius: var(--radius);
      padding: 2.2rem; text-decoration: none; color: inherit; display: flex; flex-direction: column;
      justify-content: space-between; transition: var(--transition);
    }
    .project-card:hover { border-color: var(--brand-color); transform: translateY(-4px); box-shadow: 0 15px 30px rgba(0,0,0,0.03); }
    .project-title { font-size: 1.2rem; font-weight: 700; color: var(--brand-color); margin-bottom: 0.6rem; }
    .project-summary { color: var(--text-muted); font-size: 0.92rem; margin-bottom: 1.5rem; flex-grow: 1; }
    .project-footer { display: flex; gap: 1.2rem; font-size: 0.8rem; color: var(--text-muted); font-weight: 600; padding-top: 1rem; border-top: 1px solid var(--border-line); }
    #projects-status-container { grid-column: 1 / -1; text-align: center; padding: 3rem; color: var(--text-muted); }

    /* ── CONTACT PIPELINE ARRAY ── */
    #contact { background-color: var(--bg-card); }
    .contact-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; }
    .contact-info-column { display: flex; flex-direction: column; justify-content: space-between; }
    
    .contact-cards-stack { display: flex; flex-direction: column; gap: 2rem; margin-top: 2rem; }
    .contact-detail-card { display: flex; gap: 1.2rem; align-items: flex-start; }
    .contact-detail-icon {
      width: 48px; height: 48px; border-radius: 50%; background: var(--brand-light);
      color: var(--brand-color); display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 800; flex-shrink: 0;
    }
    .contact-detail-lbl { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 700; margin-bottom: 0.2rem; }
    .contact-detail-val { font-size: 1.1rem; font-weight: 600; color: var(--text-main); }
    .contact-detail-val a { color: inherit; text-decoration: none; transition: color .2s; }
    .contact-detail-val a:hover { color: var(--brand-color); }

    /* Form Styles */
    .contact-form-block {
      background: var(--bg-primary); border: 1px solid var(--border-line);
      padding: 3.5rem 3rem; border-radius: 16px; width: 100%;
    }
    .form-group-element { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; }
    .form-group-element label { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-main); }
    .form-group-element input, .form-group-element textarea {
      background: var(--bg-card); border: 1px solid var(--border-line);
      color: var(--text-main); padding: 1rem 1.2rem; border-radius: var(--radius);
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.95rem; outline: none;
      transition: var(--transition); resize: vertical;
    }
    .form-group-element input:focus, .form-group-element textarea:focus { border-color: var(--brand-color); box-shadow: 0 0 0 3px var(--brand-light); }
    
    .action-submit-btn {
      background: var(--brand-color); color: #ffffff; border: none;
      width: 100%; padding: 1.1rem; font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700; font-size: 1rem; border-radius: var(--radius);
      cursor: pointer; transition: var(--transition); display: flex; justify-content: center; align-items: center; gap: 0.5rem;
    }
    .action-submit-btn:hover { background-color: #0c3b3f; }
    .action-submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── FOOTER FRAME WORK ── */
    footer { padding: 3rem 6vw; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1.5rem; background: var(--bg-primary); border-top: 1px solid var(--border-line); }
    footer p { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
    .footer-nav { display: flex; gap: 2rem; }
    .footer-nav a { font-size: 0.85rem; color: var(--text-muted); text-decoration: none; font-weight: 600; transition: color .2s; }
    .footer-nav a:hover { color: var(--brand-color); }

    /* ── RESPONSIVE VIEWPORT TRANSLATIONS ── */
    @media (max-width: 992px) {
      #hero { grid-template-columns: 1fr; text-align: center; min-height: auto; padding: 120px 6vw 6rem; gap: 3rem; }
      .hero-text-block { padding-top: 0; }
      .hero-paragraph { margin-left: auto; margin-right: auto; }
      .hero-buttons { justify-content: center; }
      .contact-wrapper { grid-template-columns: 1fr; gap: 4rem; }
      .contact-info-column { gap: 3rem; }
    }

      header ul { display: none; }
      .contact-form-block { padding: 2
